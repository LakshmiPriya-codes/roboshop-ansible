- name: roboshop instance mangement
  hosts: local
  connection: local
  vars:
   instances: ["mongodb", "redis", "mysql", "rabbitmq"]
   image_id: ami-0220d79f3f480ecf5
  tasks:
    - name: create instances
      amazon.aws.ec2_instance:
        instance_type: t3.micro
        name: "roboshop-{{ item }}"
        image_id: "{{ image_id }}"
        security_groups:
          - "roboshop-{{ item }}"
          -  roboshop-common
        loop: "{{ instances }}"
        register: ec2_output
        when: action == "create"

    - name: print output
      debug:
        msg: "{{ ec2_output }}"

